<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LouiTube – Chaîne</title>

  <style>
    body {
      margin: 0;
      background: #0a0f1a;
      color: #e6f0ff;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    nav {
      background: #0d1326;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid #1a2a4a;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #4da6ff;
      text-shadow: 0 0 10px #4da6ff;
    }

    nav a {
      color: #bcd4ff;
      text-decoration: none;
      font-size: 16px;
      transition: 0.2s;
    }

    nav a:hover {
      color: #4da6ff;
    }

    /* BANNIÈRE */
    .banner {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #003366, #0059b3);
      box-shadow: 0 0 20px #003366;
    }

    /* INFO CHAÎNE */
    .channel-info {
      padding: 20px;
    }

    .channel-name {
      font-size: 28px;
      font-weight: bold;
      color: #4da6ff;
      text-shadow: 0 0 8px #4da6ff;
    }

    .channel-desc {
      margin-top: 8px;
      font-size: 15px;
      color: #cfe2ff;
    }

    .subscribe-btn {
      margin-top: 15px;
      padding: 10px 18px;
      background: #4da6ff;
      border: none;
      border-radius: 6px;
      color: #0a0f1a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .subscribe-btn:hover {
      background: #80c1ff;
    }

    /* VIDEOS */
    h2 {
      margin: 25px 20px 10px;
      color: #4da6ff;
      text-shadow: 0 0 8px #4da6ff;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .video-card {
      background: #111a2e;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 0 10px #0d1b33;
      transition: 0.2s;
    }

    .video-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px #4da6ff;
    }

    .video-card iframe,
    .video-card video {
      width: 100%;
      height: 160px;
      border-radius: 10px;
      border: none;
    }

    .video-title {
      margin-top: 8px;
      font-size: 16px;
      color: #cfe2ff;
    }

    .video-desc {
      font-size: 13px;
      color: #9bb8e0;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">LouiTube</div>
    <a href="index.html">Accueil</a>
    <a href="shorts.html">Shorts</a>
    <a href="chaines.html">Chaînes</a>
    <a href="abonnements.html">Abonnements</a>
  </nav>

  <!-- BANNIÈRE -->
  <div class="banner"></div>

  <!-- INFO CHAÎNE -->
  <div class="channel-info">
    <div class="channel-name" id="channel-name"></div>
    <div class="channel-desc" id="channel-desc"></div>
    <button class="subscribe-btn">S’abonner</button>
  </div>

  <!-- VIDEOS -->
  <h2>Vidéos de la chaîne</h2>
  <div class="video-grid" id="video-list"></div>

  <script>
    /* INFORMATIONS DE LA CHAÎNE */
    const chaine = {
      id: "iyadtv", // identifiant unique
      nom: "IyadTV",
      description: "Chaîne officielle d'Iyad sur LouiTube."
    };

    document.getElementById("channel-name").textContent = chaine.nom;
    document.getElementById("channel-desc").textContent = chaine.description;

    /* SYSTÈME D’ABONNEMENT RÉEL */
    const btn = document.querySelector(".subscribe-btn");

    let abonnes = JSON.parse(localStorage.getItem("louitube_abonnements")) || [];

    function majBouton() {
      if (abonnes.includes(chaine.id)) {
        btn.textContent = "Abonné";
        btn.style.background = "#1a8cff";
        btn.style.color = "#0a0f1a";
      } else {
        btn.textContent = "S’abonner";
        btn.style.background = "#4da6ff";
        btn.style.color = "#0a0f1a";
      }
    }

    majBouton();

    btn.onclick = () => {
      if (abonnes.includes(chaine.id)) {
        abonnes = abonnes.filter(id => id !== chaine.id);
      } else {
        abonnes.push(chaine.id);
      }

      localStorage.setItem("louitube_abonnements", JSON.stringify(abonnes));
      majBouton();
    };

    /* VIDEOS DE LA CHAÎNE */
    const videos = [
      {
        titre: "Présentation de LouiTube",
        description: "Bienvenue sur la plateforme d'Iyad.",
        type: "youtube",
        url: "https://www.youtube.com/embed/dQw4w9WgXcQ"
      },
      {
        titre: "Musique Xetyiu",
        description: "Une composition au piano.",
        type: "local",
        url: "videos/musique.mp4"
      }
    ];

    const container = document.getElementById("video-list");

    videos.forEach(video => {
      const card = document.createElement("div");
      card.className = "video-card";

      let player;
      if (video.type === "youtube") {
        player = document.createElement("iframe");
        player.src = video.url;
      } else {
        player = document.createElement("video");
        player.controls = true;
        const source = document.createElement("source");
        source.src = video.url;
        source.type = "video/mp4";
        player.appendChild(source);
      }

      const title = document.createElement("div");
      title.className = "video-title";
      title.textContent = video.titre;

      const desc = document.createElement("div");
      desc.className = "video-desc";
      desc.textContent = video.description;

      card.appendChild(player);
      card.appendChild(title);
      card.appendChild(desc);
      container.appendChild(card);
    });
  </script>

</body>
</html>
