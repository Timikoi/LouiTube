<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Créer une chaîne – LouiTube</title>

  <style>
    body {
      margin: 0;
      background: #0a0f1a;
      color: #e6f0ff;
      font-family: Arial, sans-serif;
    }

    nav {
      background: #0d1326;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid #1a2a4a;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #4da6ff;
      text-shadow: 0 0 10px #4da6ff;
    }

    nav a {
      color: #bcd4ff;
      text-decoration: none;
      font-size: 16px;
      transition: 0.2s;
    }

    nav a:hover {
      color: #4da6ff;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: #111a2e;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px #0d1b33;
    }

    h2 {
      color: #4da6ff;
      text-shadow: 0 0 8px #4da6ff;
      text-align: center;
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 6px;
      border: none;
      background: #0d1326;
      color: #e6f0ff;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      background: #4da6ff;
      color: #0a0f1a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #80c1ff;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      color: #80c1ff;
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">LouiTube</div>
    <a href="index.html">Accueil</a>
    <a href="shorts.html">Shorts</a>
    <a href="chaines.html">Chaînes</a>
    <a href="abonnements.html">Abonnements</a>
    <a href="creer.html">Créer</a>
    <a href="login.html">Compte</a>
  </nav>

  <div class="container">
    <h2>Créer une chaîne</h2>

    <input type="text" id="nom" placeholder="Nom de la chaîne">
    <textarea id="desc" placeholder="Description de la chaîne"></textarea>
    <button id="create-btn">Créer la chaîne</button>

    <div class="message" id="msg"></div>
  </div>

  <script>
    const user = localStorage.getItem("louitube_user");
    const msg = document.getElementById("msg");

    if (!user) {
      msg.textContent = "Vous devez être connecté pour créer une chaîne.";
      document.getElementById("create-btn").disabled = true;
    }

    document.getElementById("create-btn").onclick = () => {
      const nom = document.getElementById("nom").value.trim();
      const desc = document.getElementById("desc").value.trim();

      if (!nom || !desc) {
        msg.textContent = "Remplissez tous les champs.";
        return;
      }

      // Récupérer toutes les chaînes existantes
      let chaines = JSON.parse(localStorage.getItem("louitube_chaines")) || {};

      // Vérifier si l'utilisateur a déjà une chaîne
      if (chaines[user]) {
        msg.textContent = "Vous avez déjà une chaîne.";
        return;
      }

      // Créer la chaîne
      chaines[user] = {
        nom: nom,
        description: desc,
        id: user + "_channel",
        page: "chaine.html" // Pour l'instant, toutes les chaînes utilisent la même page
      };

      localStorage.setItem("louitube_chaines", JSON.stringify(chaines));

      msg.textContent = "Chaîne créée avec succès !";

      setTimeout(() => {
        window.location.href = "chaines.html";
      }, 1500);
    };
  </script>

</body>
</html>
