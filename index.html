<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LouiTube</title>

  <style>
    body {
      margin: 0;
      background: #0a0f1a;
      color: #e6f0ff;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    nav {
      background: #0d1326;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid #1a2a4a;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #4da6ff;
      text-shadow: 0 0 10px #4da6ff;
    }

    nav a {
      color: #bcd4ff;
      text-decoration: none;
      font-size: 16px;
      transition: 0.2s;
    }

    nav a:hover {
      color: #4da6ff;
    }

    /* TITRES DE SECTIONS */
    h2 {
      margin: 25px 20px 10px;
      color: #4da6ff;
      text-shadow: 0 0 8px #4da6ff;
    }

    /* SHORTS */
    .shorts-grid {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding: 10px 20px 20px;
    }

    .short-card {
      background: #111a2e;
      padding: 10px;
      border-radius: 12px;
      width: 160px;
      flex-shrink: 0;
      box-shadow: 0 0 10px #0d1b33;
      transition: 0.2s;
    }

    .short-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #4da6ff;
    }

    .short-card video {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 10px;
    }

    .short-title {
      margin-top: 8px;
      font-size: 14px;
      color: #cfe2ff;
    }

    /* VIDEOS CLASSIQUES */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .video-card {
      background: #111a2e;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 0 10px #0d1b33;
      transition: 0.2s;
    }

    .video-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px #4da6ff;
    }

    .video-card iframe,
    .video-card video {
      width: 100%;
      height: 160px;
      border-radius: 10px;
      border: none;
    }

    .video-title {
      margin-top: 8px;
      font-size: 16px;
      color: #cfe2ff;
    }

    .video-desc {
      font-size: 13px;
      color: #9bb8e0;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">LouiTube</div>
    <a href="index.html">Accueil</a>
    <a href="shorts.html">Shorts</a>
    <a href="chaines.html">Chaînes</a>
    <a href="abonnements.html">Abonnements</a>
    <a href="creer.html">Créer</a>
    <a href="studio.html">LouiTube Studio</a>
  </nav>

  <!-- SHORTS -->
  <h2>Shorts</h2>
  <div class="shorts-grid" id="shorts-list"></div>

  <!-- VIDEOS -->
  <h2>Vidéos recommandées</h2>
  <div class="video-grid" id="video-list"></div>

  <script>
    /* SHORTS */
    const shorts = [
      { titre: "Mini tuto Xetyiu", url: "shorts/mini-tuto.mp4" },
      { titre: "Piano rapide", url: "shorts/piano.mp4" }
    ];

    const shortsContainer = document.getElementById("shorts-list");

    shorts.forEach(short => {
      const card = document.createElement("div");
      card.className = "short-card";

      const video = document.createElement("video");
      video.src = short.url;
      video.controls = true;

      const title = document.createElement("div");
      title.className = "short-title";
      title.textContent = short.titre;

      card.appendChild(video);
      card.appendChild(title);
      shortsContainer.appendChild(card);
    });

    /* VIDEOS CLASSIQUES */
    const videos = [
      {
        titre: "Présentation de LouiTube",
        description: "Bienvenue sur la plateforme d'Iyad.",
        type: "youtube",
        url: "https://www.youtube.com/embed/dQw4w9WgXcQ"
      },
      {
        titre: "Musique Xetyiu",
        description: "Une composition au piano.",
        type: "local",
        url: "videos/musique.mp4"
      }
    ];

    const videoContainer = document.getElementById("video-list");

    videos.forEach(video => {
      const card = document.createElement("div");
      card.className = "video-card";

      let player;
      if (video.type === "youtube") {
        player = document.createElement("iframe");
        player.src = video.url;
      } else {
        player = document.createElement("video");
        player.controls = true;
        const source = document.createElement("source");
        source.src = video.url;
        source.type = "video/mp4";
        player.appendChild(source);
      }

      const title = document.createElement("div");
      title.className = "video-title";
      title.textContent = video.titre;

      const desc = document.createElement("div");
      desc.className = "video-desc";
      desc.textContent = video.description;

      card.appendChild(player);
      card.appendChild(title);
      card.appendChild(desc);
      videoContainer.appendChild(card);
    });
  </script>

</body>
</html>
