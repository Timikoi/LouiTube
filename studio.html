<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LouiTube Studio</title>

  <style>
    body {
      margin: 0;
      background: #0a0f1a;
      color: #e6f0ff;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    nav {
      background: #0d1326;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 2px solid #1a2a4a;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      color: #4da6ff;
      text-shadow: 0 0 10px #4da6ff;
    }

    nav a {
      color: #bcd4ff;
      text-decoration: none;
      font-size: 16px;
      transition: 0.2s;
    }

    nav a:hover {
      color: #4da6ff;
    }

    /* CONTENU */
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #111a2e;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px #0d1b33;
    }

    h2 {
      color: #4da6ff;
      text-shadow: 0 0 8px #4da6ff;
      text-align: center;
    }

    .video-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .video-card {
      background: #0d1326;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
      box-shadow: 0 0 10px #0d1b33;
    }

    .video-thumb {
      width: 160px;
      height: 90px;
      background: #1a2a4a;
      border-radius: 8px;
    }

    .video-info {
      flex-grow: 1;
    }

    .video-title {
      font-size: 18px;
      font-weight: bold;
      color: #cfe2ff;
    }

    .video-actions button {
      margin-left: 10px;
      padding: 8px 12px;
      background: #4da6ff;
      border: none;
      border-radius: 6px;
      color: #0a0f1a;
      cursor: pointer;
      transition: 0.2s;
    }

    .video-actions button:hover {
      background: #80c1ff;
    }

    .delete-btn {
      background: #ff4d4d;
      color: white;
    }

    .delete-btn:hover {
      background: #ff8080;
    }

    .message {
      text-align: center;
      margin-top: 20px;
      color: #9bb8e0;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">LouiTube</div>
    <a href="index.html">Accueil</a>
    <a href="shorts.html">Shorts</a>
    <a href="chaines.html">Chaînes</a>
    <a href="abonnements.html">Abonnements</a>
    <a href="creer.html">Créer</a>
    <a href="login.html">Compte</a>
  </nav>

  <div class="container">
    <h2>LouiTube Studio</h2>

    <div class="message" id="msg"></div>

    <div class="video-list" id="video-list"></div>
  </div>

  <script>
    /* Vérifier si l'utilisateur est connecté */
    const user = localStorage.getItem("louitube_user");
    const msg = document.getElementById("msg");
    const list = document.getElementById("video-list");

    if (!user) {
      msg.textContent = "Vous devez être connecté pour accéder au Studio.";
    } else {
      msg.textContent = "Connecté en tant que : " + user;
    }

    /* Récupérer les vidéos de l'utilisateur */
    let videos = JSON.parse(localStorage.getItem("louitube_videos_" + user)) || [];

    function afficherVideos() {
      list.innerHTML = "";

      if (videos.length === 0) {
        list.innerHTML = "<div class='message'>Aucune vidéo pour le moment.</div>";
        return;
      }

      videos.forEach((video, index) => {
        const card = document.createElement("div");
        card.className = "video-card";

        const thumb = document.createElement("div");
        thumb.className = "video-thumb";

        const info = document.createElement("div");
        info.className = "video-info";

        const title = document.createElement("div");
        title.className = "video-title";
        title.textContent = video.titre;

        const actions = document.createElement("div");
        actions.className = "video-actions";

        const btnDelete = document.createElement("button");
        btnDelete.className = "delete-btn";
        btnDelete.textContent = "Supprimer";

        btnDelete.onclick = () => {
          videos.splice(index, 1);
          localStorage.setItem("louitube_videos_" + user, JSON.stringify(videos));
          afficherVideos();
        };

        actions.appendChild(btnDelete);
        info.appendChild(title);
        card.appendChild(thumb);
        card.appendChild(info);
        card.appendChild(actions);

        list.appendChild(card);
      });
    }

    afficherVideos();
  </script>

</body>
</html>
